name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install

      - name: Build binary
        env:
          OPENCODE_VERSION: ${{ inputs.version }}
        run: |
          cd packages/opencode
          bun run script/build.ts --single --skip-embed-web-ui

      - name: Package and upload
        run: |
          cd packages/opencode
          ARCHIVE="gtaqcode-linux-x64.tar.gz"
          tar -czf "$ARCHIVE" -C dist/gtaqcode-linux-x64/bin .
          gh release upload v${{ inputs.version }} "$ARCHIVE" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
