name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          gh release delete v${{ inputs.version }} --yes 2>/dev/null || true
          gh release create v${{ inputs.version }} \
            --title "v${{ inputs.version }}" \
            --target ${{ github.sha }} \
            --notes "Release v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Build and upload
        env:
          OPENCODE_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd packages/opencode
          bun run script/build.ts --single --skip-embed-web-ui
          ARCHIVE="gtaqcode-linux-x64.tar.gz"
          tar -czf "$ARCHIVE" -C dist/gtaqcode-linux-x64/bin .
          gh release upload v${{ inputs.version }} "$ARCHIVE" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Build and upload
        env:
          OPENCODE_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd packages/opencode
          bun run script/build.ts --single --skip-embed-web-ui
          $ARCHIVE="gtaqcode-windows-x64.zip"
           7z a "$ARCHIVE" ./dist/gtaqcode-windows-x64/bin/*
          gh release upload v${{ inputs.version }} "$ARCHIVE" --clobber
